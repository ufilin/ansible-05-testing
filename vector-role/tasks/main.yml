---
- name: Check if vector is already installed
  ansible.builtin.stat:
    path: /usr/bin/vector
  register: vector_binary

- name: Install prerequisites (Debian/Ubuntu)
  ansible.builtin.apt:
    name:
      - curl
      - tar
    state: present
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Install prerequisites (RedHat/Oracle)
  ansible.builtin.yum:
    name:
      - curl
      - tar
    state: present
    update_cache: yes
  when: ansible_os_family == "RedHat"

- name: Download Vector
  ansible.builtin.get_url:
    url: "https://github.com/vectordotdev/vector/releases/download/v0.21.1/vector-0.21.1-{{ ansible_architecture }}-unknown-linux-gnu.tar.gz"
    dest: "/tmp/vector-{{ ansible_architecture }}.tar.gz"
    mode: '0644'
  when: not vector_binary.stat.exists

- name: Extract Vector
  ansible.builtin.unarchive:
    src: "/tmp/vector-{{ ansible_architecture }}.tar.gz"
    dest: "/tmp"
    remote_src: yes
    creates: "/tmp/vector-{{ ansible_architecture }}-unknown-linux-gnu/bin/vector"
  when: not vector_binary.stat.exists

- name: Install Vector binary
  ansible.builtin.copy:
    src: "/tmp/vector-{{ ansible_architecture }}-unknown-linux-gnu/bin/vector"
    dest: "/usr/bin/vector"
    mode: '0755'
    remote_src: yes
  when: not vector_binary.stat.exists

- name: Create Vector config directory
  ansible.builtin.file:
    path: /etc/vector
    state: directory
    mode: '0755'
    owner: root
    group: root

- name: Create Vector data directory
  ansible.builtin.file:
    path: /var/lib/vector
    state: directory
    mode: '0755'
    owner: root
    group: root

- name: Create Vector config file
  ansible.builtin.template:
    src: vector.yml.j2
    dest: /etc/vector/vector.yaml
    mode: '0644'
    owner: root
    group: root
  register: config_result
  notify: Restart vector

- name: Clean up temporary files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "/tmp/vector-{{ ansible_architecture }}.tar.gz"
    - "/tmp/vector-{{ ansible_architecture }}-unknown-linux-gnu"
  when: not vector_binary.stat.exists

- name: Create systemd service for Vector
  ansible.builtin.copy:
    dest: /etc/systemd/system/vector.service
    content: |
      [Unit]
      Description=Vector
      After=network-online.target
      Wants=network-online.target

      [Service]
      User=root
      Group=root
      ExecStart=/usr/bin/vector --config /etc/vector/vector.yaml
      Restart=always
      RestartSec=10
      LimitNOFILE=1048576

      [Install]
      WantedBy=multi-user.target
    mode: '0644'
    owner: root
    group: root
  notify: Restart vector
  when: ansible_service_mgr == "systemd"

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: yes
  when: ansible_service_mgr == "systemd"

- name: Start Vector
  ansible.builtin.systemd:
    name: vector
    state: started
    enabled: yes
  when: ansible_service_mgr == "systemd"

- name: Start Vector (without systemd)
  ansible.builtin.command: /usr/bin/vector --config /etc/vector/vector.yaml
  when: ansible_service_mgr != "systemd"
  async: 30
  poll: 0
